<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocorrências - Cidade Ativa</title>
    <!-- Abra com Live Server (ou outro http://) para a lista carregar; file:// costuma bloquear chamadas à API. -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="css/ocorrencias.css" rel="stylesheet">
    <link href="css/modal.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>

<body>

    <div class="bg-overlay"></div>

    <nav>
        <a href="index.html">Voltar</a>
        <img src="images/Logo.png" class="Logo" alt="Logo">
    </nav>

    <main class="container">
        <section class="content">

            <div class="occurrences-list" aria-live="polite"></div>
        </section>
    </main>
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Editar Ocorrência</h2>
            <form id="editForm">
                <input type="text" id="editTitle" placeholder="Título">
                <input type="text" id="editLocation" placeholder="Localização">
                <textarea id="editDescription" placeholder="Descrição"></textarea>
                <button type="submit">Salvar</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/config.js"></script>
    <script src="js/ocorrencias.js"></script>
</body>

</html>

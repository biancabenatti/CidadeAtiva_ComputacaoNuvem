<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocorrências - Cidade Ativa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="css/ocorrencias.css" rel="stylesheet">
    <link href="css/modal.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>

<body>

    <div class="bg-overlay"></div>

    <nav>
        <a href="index.html">Voltar</a>
        <img src="images/Logo.png" class="Logo" alt="Logo">
    </nav>

    <main class="container">
        <section class="content">

            <div class="occurrences-list">
                <div class="card">
                    <div class="card-info">
                        <strong>Buraco na rua</strong>

                        <p class="card-label">Localização</p>
                        <p class="text-data">Rua das Flores, 123</p>

                        <p class="card-label">Descrição</p>
                        <p class="text-description">Existe um buraco enorme que está causando acidentes na via principal.</p>
                    </div>

                    <div class="card-actions-vertical">
                        <button class="btn-icon edit" title="Editar">
                            <i class="fas fa-pencil-alt"></i>
                        </button>
                        <button class="btn-icon delete" title="Deletar">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>

                    <div class="card-image-preview">
                        <img src="images/Registrar.jpg" alt="Foto da ocorrência">
                    </div>
                </div>
            </div>
        </section>
    </main>
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Editar Ocorrência</h2>
            <form id="editForm">
                <input type="text" id="editTitle" placeholder="Título">
                <input type="text" id="editLocation" placeholder="Localização">
                <textarea id="editDescription" placeholder="Descrição"></textarea>
                <button type="submit">Salvar</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/ocorrencias.js"></script>
</body>

</html>

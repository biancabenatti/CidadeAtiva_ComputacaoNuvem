<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Registrar Ocorrência</title>
    <link href="css/registrar.css" rel="stylesheet">
</head>

<body>

<nav>
    <a href="index.html">Voltar</a>
    <img src="images/Logo.png" class="Logo" alt="Logo">
</nav>

<section class="registrar-container">
    <div class="side-image">
        </div>

    <div class="form-side">
        <form>
            <div class="form-group">
                <label>Título</label>
                <input type="text" placeholder="Ex: Buraco na rua">
            </div>

            <div class="form-group">
                <label>Localização</label>
                <input type="text" placeholder="Ex: Rua das Flores, 123">
            </div>

            <div class="form-group">
                <label>Descrição</label>
                <textarea placeholder="Descreva o problema..."></textarea>
            </div>

            <div class="form-group">
                <label>Foto da ocorrência</label>
                <input type="file" accept="image/*">
            </div>

            <button class="btn-send">
                Enviar ocorrência
            </button>
        </form>
    </div>
</section>

</body>
</html>
